<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jarvis — Folder Access</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #00ff88;
      font-family: 'Courier New', monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 95%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      height: 90vh;
    }

    .header {
      text-align: center;
      padding: 16px 0;
      border-bottom: 1px solid #00ff8844;
    }

    .header h1 {
      font-size: 1.5rem;
      letter-spacing: 4px;
      color: #00ff88;
    }

    .header p {
      font-size: 0.75rem;
      color: #00ff8866;
      margin-top: 4px;
    }

    /* Server URL input */
    .server-bar {
      display: flex;
      gap: 8px;
      padding: 10px 0;
      border-bottom: 1px solid #00ff8822;
    }

    .server-bar input {
      flex: 1;
      background: #111;
      border: 1px solid #00ff8844;
      color: #00ff88;
      padding: 8px 12px;
      font-family: 'Courier New', monospace;
      font-size: 0.75rem;
      border-radius: 4px;
      outline: none;
    }

    .server-bar button {
      background: #00ff8822;
      border: 1px solid #00ff88;
      color: #00ff88;
      padding: 8px 14px;
      cursor: pointer;
      font-family: 'Courier New', monospace;
      font-size: 0.75rem;
      border-radius: 4px;
    }

    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ff4444;
      margin-right: 6px;
    }

    .status-dot.online { background: #00ff88; }

    /* Chat area */
    .chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 16px 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 85%;
    }

    .message.user { align-self: flex-end; align-items: flex-end; }
    .message.bot  { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 0.85rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .user .bubble {
      background: #00ff8822;
      border: 1px solid #00ff8855;
      color: #00ff88;
    }

    .bot .bubble {
      background: #111;
      border: 1px solid #00ff8833;
      color: #aaffcc;
    }

    .label {
      font-size: 0.65rem;
      color: #00ff8855;
      margin-bottom: 4px;
    }

    /* Input area */
    .input-area {
      display: flex;
      gap: 8px;
      padding: 12px 0;
      border-top: 1px solid #00ff8822;
    }

    .input-area input {
      flex: 1;
      background: #111;
      border: 1px solid #00ff8844;
      color: #00ff88;
      padding: 12px 16px;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      border-radius: 8px;
      outline: none;
    }

    .input-area input::placeholder { color: #00ff8844; }

    .input-area input:focus { border-color: #00ff88; }

    .input-area button {
      background: #00ff88;
      border: none;
      color: #000;
      padding: 12px 20px;
      cursor: pointer;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      font-size: 0.9rem;
      border-radius: 8px;
    }

    .input-area button:active { opacity: 0.8; }

    /* Scrollbar */
    .chat-box::-webkit-scrollbar { width: 4px; }
    .chat-box::-webkit-scrollbar-track { background: #0a0a0a; }
    .chat-box::-webkit-scrollbar-thumb { background: #00ff8844; border-radius: 2px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>⚡ JARVIS</h1>
      <p>Folder Access Interface</p>
    </div>

    <!-- ngrok URL bar -->
    <div class="server-bar">
      <input type="text" id="serverUrl" placeholder="ngrok URL daalo: https://xxxx.ngrok.io" />
      <button onclick="checkServer()">
        <span class="status-dot" id="dot"></span>Connect
      </button>
    </div>

    <!-- Chat messages -->
    <div class="chat-box" id="chatBox">
      <div class="message bot">
        <span class="label">JARVIS</span>
        <div class="bubble">Namaste! Main Jarvis hoon.
Pehle upar ngrok URL daalo aur Connect karo.
Phir folder ka naam likho — main use tumhare PC par dhundhkar khol dunga.</div>
      </div>
    </div>

    <!-- Input -->
    <div class="input-area">
      <input type="text" id="userInput" placeholder="Folder ka naam likho..." onkeydown="handleKey(event)" />
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    let serverUrl = '';
    const SECRET_KEY = 'jarvis2026'; // Same key jo server mein hai

    // Server se connect karo
    async function checkServer() {
      const url = document.getElementById('serverUrl').value.trim().replace(/\/$/, '');
      if (!url) {
        addMessage('bot', '⚠️ Pehle ngrok URL daalo!');
        return;
      }

      try {
        const res = await fetch(`${url}/ping`, {
          headers: { 'ngrok-skip-browser-warning': 'true' }
        });
        const data = await res.json();
        if (data.status === 'online') {
          serverUrl = url;
          document.getElementById('dot').classList.add('online');
          addMessage('bot', `✅ Connected! PC User: ${data.pc}\nAb folder ka naam likho.`);
        }
      } catch (e) {
        document.getElementById('dot').classList.remove('online');
        addMessage('bot', '❌ Connect nahi hua. ngrok URL check karo aur PC par server chala rahe ho na?');
      }
    }

    // Message bhejo
    async function sendMessage() {
      const input = document.getElementById('userInput');
      const text = input.value.trim();
      if (!text) return;

      addMessage('user', text);
      input.value = '';

      if (!serverUrl) {
        addMessage('bot', '⚠️ Pehle ngrok URL daalo aur Connect karo!');
        return;
      }

      addMessage('bot', `🔍 "${text}" dhoondh raha hoon...`);

      try {
        const res = await fetch(`${serverUrl}/search`, {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'ngrok-skip-browser-warning': 'true',
            'x-secret-key': SECRET_KEY
          },
          body: JSON.stringify({ folderName: text })
        });

        const data = await res.json();

        let reply = data.message;
        if (data.paths && data.paths.length > 0) {
          reply += '\n\n📁 Paths:\n' + data.paths.map((p, i) => `${i+1}. ${p}`).join('\n');
        }

        // Last bot message replace karo (loading wala)
        const msgs = document.querySelectorAll('.message.bot');
        msgs[msgs.length - 1].querySelector('.bubble').textContent = reply;

      } catch (e) {
        const msgs = document.querySelectorAll('.message.bot');
        msgs[msgs.length - 1].querySelector('.bubble').textContent = '❌ Server se response nahi aaya. PC par server chal raha hai?';
      }
    }

    function handleKey(e) {
      if (e.key === 'Enter') sendMessage();
    }

    function addMessage(type, text) {
      const chatBox = document.getElementById('chatBox');
      const div = document.createElement('div');
      div.className = `message ${type}`;
      div.innerHTML = `
        <span class="label">${type === 'user' ? 'YOU' : 'JARVIS'}</span>
        <div class="bubble">${text}</div>
      `;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }
  </script>
</body>
</html>
